services:
  # Aplicação Laravel
  laravel.test:
    build:
      context: ./vendor/laravel/sail/runtimes/8.3
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.3/app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-8000}:80'
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - '.:/var/www/html'
    networks:
      - jobflow
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - mailpit

  # MySQL 8 (ADR-001: Polyglot Persistence)
  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
    networks:
      - jobflow
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
      retries: 3
      timeout: 5s

  # Redis (cache + filas secundárias)
  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - jobflow
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s

  # RabbitMQ (ADR-002: Mensageria com garantia de entrega)
  rabbitmq:
    image: 'rabbitmq:3.12-management-alpine'
    ports:
      - '${FORWARD_RABBITMQ_PORT:-5672}:5672'
      - '15672:15672'  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: '${RABBITMQ_USERNAME}'
      RABBITMQ_DEFAULT_PASS: '${RABBITMQ_PASSWORD}'
    volumes:
      - 'sail-rabbitmq:/var/lib/rabbitmq'
    networks:
      - jobflow
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      retries: 3
      timeout: 5s

  # Mailpit (testing de e-mails)
  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - jobflow

networks:
  jobflow:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local
  sail-rabbitmq:
    driver: local
