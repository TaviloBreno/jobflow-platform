x-webhooks:
  JobPublished:
    post:
      summary: Webhook disparado quando vaga é publicada
      description: |
        Notifica consumidores externos (ex: job boards parceiros) quando uma vaga é publicada.
        
        **Exchange RabbitMQ:** `jobflow.jobs`  
        **Routing Key:** `job.published`  
        **Payload:** Ver [Domain Events Catalog](../domain-events-catalog.md#jobpublished)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event_id:
                  type: string
                  format: uuid
                event_type:
                  type: string
                  enum: [job.published]
                aggregate_id:
                  type: string
                  format: uuid
                payload:
                  $ref: '#/components/schemas/JobCreatedResponse'
      responses:
        '200':
          description: Webhook recebido e processado
        '202':
          description: Webhook aceito para processamento assíncrono
        '400':
          description: Payload inválido
        '401':
          description: Assinatura HMAC inválida (se aplicável)

x-rate-limits:
  default:
    requests: 100
    period: 1h
    description: Limite padrão para endpoints autenticados
  upload_resume:
    requests: 5
    period: 1h
    description: Limite específico para upload de currículos

x-observability:
  tracing:
    provider: OpenTelemetry
    headers:
      - traceparent
      - tracestate
      - X-Request-Id
  metrics:
    endpoint: /metrics
    format: Prometheus
  logging:
    correlation:
      header: X-Request-Id
      propagate: true